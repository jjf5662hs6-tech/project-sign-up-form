<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Project Sign Up Form</title>
</head>
<body>
    <div class="container">
        <div class="img">
            <img src="./side bar photo.jpeg" alt="picture of an aaron" height="200px" width="100">
        </div>
        <div class="content">
            <div class="text">
                <p>This is not a real online service! You know you need
                    something like this to help you realize your deepest
                    dreams. Sign up <em>now</em> to get started.
                </p>
                <p>you <em>know</em> you want to</p>
            </div>
            <div class="form">
                <p>Let's do this!</p>
                <form action="" get="">
                    <fieldset>
                            <section class="left">
                                <p>
                                    <label for="firstname">First Name</label>
                                    <input class="focus" type="text" firstname="" name="user_firstname">
                                </p>
                                <p>
                                    <label for="email">Email</label>
                                    <input class="focus" type="mail" email="" id="email" required name="user_email">
                                </p>
                                <p>
                                    <label for="password">Password</label>
                                    <input type="password" id="password" required>
                                </p>
                            </section>
                            <section class="right">
                                <p>
                                    <label for="lastname">Last Name</label>
                                    <input class="focus" type="text" lastname="" id="lastname" name="user_lastname">
                                </p>
                
                                <p>
                                    <label for="phone">Phone Number</label>
                                    <input class="focus" type="tel" id="phone">
                                </p>
                
                                <p>
                                    <label for="confirm_password">Confirm password</label>
                                    <input type="password" id="confirm_password" required>
                                </p>
                            </section>
                
                    </fieldset>
                </form>
            </div>
            <div class="button">
                <button>Create an account</button>
                <p>Already have an account? Login</p>
            </div>
        </div>
    </div>
</body>
</html>
